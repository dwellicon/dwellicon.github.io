<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwellicon</title>
    <style>
        /* --- CSS RESET & VARIABLES --- */
        :root {
            --bg-app: #1a1a2e;
            --bg-panel: #16213e;
            --bg-input: #0f3460;
            --accent: #e94560;
            --accent-hover: #c22a42;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: 1px solid rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: 'Courier New', Courier, monospace; /* Retro-tech font */
            background-color: var(--bg-app); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- LIVE BACKGROUND (LOGIN) --- */
        .live-bg {
            position: absolute; inset: 0; z-index: -1;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- UTILS --- */
        .hidden { display: none !important; }
        .btn { padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 10px var(--accent); }
        .btn-danger { background: #ff4757; color: white; }
        
        input, select { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px; width: 100%; margin-bottom: 10px; border-radius: 4px; }
        input:focus { border-color: var(--accent); }

        /* --- LOGIN SCREEN --- */
        #login-layer { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 350px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
        }

        /* --- APP GRID LAYOUT (FIXED STRUCTURE) --- */
        #app-layer {
            display: grid;
            grid-template-columns: 80px 250px 1fr 250px; /* Strict widths */
            height: 100vh;
            width: 100vw;
        }

        /* Col 1: Servers */
        #col-servers { background: #0f111a; border-right: var(--border); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; overflow-y: auto; }
        .server-icon { 
            width: 50px; height: 50px; border-radius: 50%; background: #333; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; border: 2px solid transparent;
            font-weight: bold; font-size: 18px; color: white; overflow: hidden;
        }
        .server-icon:hover { border-color: var(--accent); border-radius: 15px; }
        .server-icon.active { border-color: var(--accent); border-radius: 15px; background: var(--accent); }
        .server-icon img { width: 100%; height: 100%; object-fit: cover; }

        /* Col 2: Channels/Info */
        #col-channels { background: var(--bg-panel); display: flex; flex-direction: column; border-right: var(--border); }
        .panel-header { padding: 20px; border-bottom: var(--border); font-weight: bold; letter-spacing: 1px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .channel-list { padding: 20px; flex: 1; }
        .user-bar { padding: 15px; background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; }
        .user-bar img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); }
        
        /* Col 3: Chat */
        #col-chat { background: var(--bg-app); display: flex; flex-direction: column; position: relative; }
        .chat-feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { display: flex; gap: 15px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; object-fit: cover; flex-shrink: 0; }
        .msg-content { flex: 1; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; }
        .msg-top { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8em; color: var(--text-muted); }
        .msg-name { color: var(--accent); font-weight: bold; font-size: 1em; cursor: pointer; }
        
        /* Attachments */
        .attachment-img { max-width: 300px; max-height: 300px; border-radius: 8px; margin-top: 10px; border: 1px solid #444; }
        .attachment-file { display: block; margin-top: 10px; padding: 10px; background: #222; border-radius: 4px; color: var(--accent); text-decoration: none; border: 1px solid var(--accent); }

        /* Input Area */
        .input-zone { padding: 20px; background: var(--bg-panel); display: flex; gap: 10px; border-top: var(--border); }
        .upload-btn { width: 40px; height: 40px; border-radius: 50%; background: #333; color: white; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .upload-btn:hover { background: var(--text-main); color: black; }
        #msg-input { margin: 0; background: var(--bg-app); border: none; flex: 1; }

        /* Col 4: Members */
        #col-members { background: var(--bg-panel); border-left: var(--border); padding: 20px; overflow-y: auto; }
        .member-item { display: flex; align-items: center; gap: 10px; padding: 8px; margin-bottom: 5px; cursor: pointer; opacity: 0.7; }
        .member-item:hover { opacity: 1; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .status-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #16213e; padding: 25px; border-radius: 8px; border: 1px solid var(--accent); width: 400px; max-width: 90%; }
        .modal-header { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; color: var(--accent); display: flex; justify-content: space-between; }
        .close-x { cursor: pointer; }

    </style>
</head>
<body>

    <!-- LIVE BACKGROUND -->
    <div class="live-bg"></div>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-layer">
        <div class="glass-panel">
            <h1 style="color:white; margin-bottom:10px; font-size: 2em; text-shadow: 0 0 10px rgba(0,0,0,0.5);">DWELLICON</h1>
            <p style="color: #ddd; margin-bottom: 20px; font-size: 0.9em;">Restricted Access Terminal</p>
            
            <input type="text" id="login-user" placeholder="IDENTITY">
            <input type="password" id="login-pass" placeholder="PASSPHRASE">
            
            <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="attemptLogin()">Connect</button>
            <div id="login-msg" style="color: #ff4757; margin-top: 10px; font-size: 0.8em;"></div>
        </div>
    </div>

    <!-- 2. MAIN APP INTERFACE -->
    <div id="app-layer" class="hidden">
        <!-- Column 1: Server List -->
        <div id="col-servers">
            <div class="server-icon" onclick="openServerModal()" style="color: #2ecc71; border: 2px dashed #2ecc71;">+</div>
            <div style="width: 50%; height: 1px; background: #444; margin: 5px 0;"></div>
            <div id="server-list-wrapper" style="display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center;">
                <!-- Servers injected here -->
            </div>
        </div>

        <!-- Column 2: Info/Settings -->
        <div id="col-channels">
            <div class="panel-header">
                <span id="active-server-name">SELECT SERVER</span>
                <span id="server-invite-code" style="font-size: 0.7em; color: #2ecc71; display:none; border: 1px solid #2ecc71; padding: 2px 4px;"></span>
            </div>
            <div class="channel-list">
                <div style="color: var(--text-muted); font-size: 0.8em; margin-bottom: 10px;">TEXT CHANNELS</div>
                <div style="padding: 8px; background: rgba(233, 69, 96, 0.1); color: var(--accent); border-radius: 4px; cursor: pointer;"># general</div>
                
                <!-- Admin Tools -->
                <div id="admin-tools-area" style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;" class="hidden">
                    <div style="color: #ff4757; font-size: 0.8em; margin-bottom: 10px;">ADMIN TERMINAL</div>
                    <button class="btn btn-primary" style="width:100%; font-size: 0.7em;" onclick="openOwnerConsole()">User Manager</button>
                </div>
            </div>
            <div class="user-bar">
                <img id="my-pfp" src="">
                <div style="flex: 1;">
                    <div id="my-nick" style="font-weight: bold; font-size: 0.9em;">User</div>
                    <div id="my-role" style="font-size: 0.7em; color: var(--accent);">Loading...</div>
                </div>
                <button onclick="openProfile()" style="background:none; border:none; color:#aaa; cursor:pointer;">⚙️</button>
                <button onclick="logout()" style="background:none; border:none; color:#ff4757; cursor:pointer;">⏻</button>
            </div>
        </div>

        <!-- Column 3: Chat -->
        <div id="col-chat">
            <div class="chat-feed" id="message-feed">
                <!-- Messages -->
            </div>
            <div class="input-zone">
                <input type="file" id="file-upload" hidden onchange="uploadAndSend()">
                <button class="upload-btn" onclick="document.getElementById('file-upload').click()">📎</button>
                <input type="text" id="chat-input" placeholder="Transmission...">
                <button class="btn btn-primary" onclick="sendText()">SEND</button>
            </div>
        </div>

        <!-- Column 4: Members -->
        <div id="col-members">
            <div style="color: var(--text-muted); font-size: 0.8em; margin-bottom: 15px;">ONLINE OPERATIVES</div>
            <div id="members-list-wrapper">
                <!-- Members -->
            </div>
        </div>
    </div>

    <!-- MODALS -->
    
    <!-- Server Create/Join -->
    <div id="modal-server" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header"><span>Server Operations</span> <span class="close-x" onclick="closeModals()">✕</span></div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-primary" style="flex:1" onclick="toggleServerMode('create')">Create</button>
                <button class="btn" style="flex:1; background:#333; color:white;" onclick="toggleServerMode('join')">Join</button>
            </div>

            <!-- Create Form -->
            <div id="form-create">
                <input type="text" id="new-srv-name" placeholder="Server Name">
                <input type="text" id="new-srv-img" placeholder="Icon URL (Optional)">
                <select id="new-srv-type">
                    <option value="public">Public (Listed)</option>
                    <option value="private">Private (Code Required)</option>
                </select>
                <button class="btn btn-primary" style="width:100%" onclick="createServer()">Launch Server</button>
            </div>

            <!-- Join Form -->
            <div id="form-join" class="hidden">
                <input type="text" id="join-code" placeholder="Enter Invite Code">
                <button class="btn btn-primary" style="width:100%" onclick="joinServer()">Connect</button>
            </div>
        </div>
    </div>

    <!-- Profile -->
    <div id="modal-profile" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header"><span>Edit Identity</span> <span class="close-x" onclick="closeModals()">✕</span></div>
            <label>Nickname</label> <input type="text" id="edit-nick">
            <label>Bio</label> <input type="text" id="edit-bio">
            <label>Avatar URL</label> <input type="text" id="edit-pfp">
            <button class="btn btn-primary" onclick="saveProfile()">Update Identity</button>
        </div>
    </div>

    <!-- Owner Console -->
    <div id="modal-owner" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header"><span>Whitelist Manager</span> <span class="close-x" onclick="closeModals()">✕</span></div>
            <input type="text" id="mk-user" placeholder="New Username">
            <input type="text" id="mk-pass" placeholder="New Password">
            <select id="mk-role">
                <option value="user">Standard User</option>
                <option value="admin">Administrator</option>
            </select>
            <button class="btn btn-danger" style="width:100%" onclick="ownerCreateUser()">Authorize User</button>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAulcwmA2r2Z0Wv5mxyuWwQvPv05E8HvMU",
            authDomain: "dwellicon-42e72.firebaseapp.com",
            databaseURL: "https://dwellicon-42e72-default-rtdb.firebaseio.com",
            projectId: "dwellicon-42e72",
            storageBucket: "dwellicon-42e72.firebasestorage.app",
            messagingSenderId: "634657717896",
            appId: "1:634657717896:web:27f246614fdb2c2398a93d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // --- GLOBAL STATE ---
        let me = null; // Current user object
        let currentServer = null; // ID string
        let usersCache = {}; // Map of uid -> userData

        // --- AUTHENTICATION ---
        window.attemptLogin = async () => {
            const u = document.getElementById('login-user').value.trim();
            const p = document.getElementById('login-pass').value.trim();
            const err = document.getElementById('login-msg');

            if(!u || !p) { err.innerText = "MISSING CREDENTIALS"; return; }

            // 1. KYSON BACKDOOR (Hardcoded Owner)
            if(u === "Kyson" && p === "12345678") {
                finalizeLogin({
                    username: "Kyson",
                    role: "owner",
                    nick: "Kyson (Owner)",
                    pfp: "https://cdn-icons-png.flaticon.com/512/2922/2922506.png",
                    bio: "System Architect"
                });
                return;
            }

            // 2. DATABASE WHITELIST CHECK
            try {
                const snap = await get(ref(db, 'users/' + u));
                if(snap.exists()) {
                    const data = snap.val();
                    if(data.password === p) {
                        if(data.banned) {
                            err.innerText = "ACCESS DENIED: ACCOUNT BANNED";
                            return;
                        }
                        finalizeLogin({ username: u, ...data });
                    } else {
                        err.innerText = "INVALID PASSPHRASE";
                    }
                } else {
                    err.innerText = "USER NOT WHITELISTED";
                }
            } catch(e) {
                console.error(e);
                err.innerText = "CONNECTION ERROR";
            }
        };

        function finalizeLogin(userObj) {
            me = userObj;
            localStorage.setItem('dwellicon_user', JSON.stringify(me));
            
            // Hide Login, Show App (Use flex/grid classes)
            document.getElementById('login-layer').style.display = 'none';
            document.getElementById('app-layer').classList.remove('hidden'); // Grid takes over

            // Setup UI
            document.getElementById('my-nick').innerText = me.nick || me.username;
            document.getElementById('my-role').innerText = `[${me.role.toUpperCase()}]`;
            document.getElementById('my-pfp').src = me.pfp || "https://cdn-icons-png.flaticon.com/512/1077/1077114.png";

            if(me.role === 'owner' || me.role === 'admin') {
                document.getElementById('admin-tools-area').classList.remove('hidden');
            }

            // Presence System
            const presenceRef = ref(db, `presence/${me.username}`);
            set(presenceRef, { online: true, lastSeen: Date.now() });
            // Remove on disconnect
            window.addEventListener('beforeunload', () => remove(presenceRef));

            initRealtimeListeners();
        }

        window.logout = () => {
            if(me) remove(ref(db, `presence/${me.username}`));
            localStorage.removeItem('dwellicon_user');
            location.reload();
        };

        // --- REALTIME DATA ---
        function initRealtimeListeners() {
            // 1. USERS CACHE (For looking up PFP/Nicks in chat)
            onValue(ref(db, 'users'), snap => usersCache = snap.val() || {});

            // 2. SERVERS LIST
            onValue(ref(db, 'servers'), snap => {
                const wrapper = document.getElementById('server-list-wrapper');
                wrapper.innerHTML = ""; // Clean refresh
                const servers = snap.val() || {};
                
                Object.entries(servers).forEach(([id, s]) => {
                    const isJoined = (me.joinedServers && me.joinedServers[id]) || me.role === 'owner';
                    const isPublic = s.type === 'public';

                    if(isPublic || isJoined) {
                        const div = document.createElement('div');
                        div.className = `server-icon ${currentServer === id ? 'active' : ''}`;
                        // If image exists use it, else initials
                        if(s.img) {
                            div.innerHTML = `<img src="${s.img}">`;
                        } else {
                            div.innerText = s.name.substring(0,2).toUpperCase();
                        }
                        div.title = s.name;
                        div.onclick = () => switchServer(id, s);
                        wrapper.appendChild(div);
                    }
                });

                // Auto-select first if null
                if(!currentServer && Object.keys(servers).length > 0) {
                    const firstId = Object.keys(servers)[0];
                    // Check access before switching
                    if(servers[firstId].type === 'public' || (me.joinedServers && me.joinedServers[firstId]) || me.role === 'owner') {
                        switchServer(firstId, servers[firstId]);
                    }
                }
            });
        }

        // --- SERVER LOGIC ---
        window.switchServer = (id, sData) => {
            currentServer = id;
            
            // UI Update (Active class)
            const icons = document.querySelectorAll('.server-icon');
            icons.forEach(i => i.classList.remove('active'));
            // We rely on the onValue re-render to set active class, but for instant feedback:
            // (Optional: Find the element and add class manually if you want instant feel)

            document.getElementById('active-server-name').innerText = sData.name.toUpperCase();
            
            // Show Code if Private & Admin
            const codeSpan = document.getElementById('server-invite-code');
            if(sData.type === 'private' && (me.role === 'admin' || me.role === 'owner')) {
                codeSpan.style.display = 'inline-block';
                codeSpan.innerText = `CODE: ${sData.inviteCode}`;
            } else {
                codeSpan.style.display = 'none';
            }

            loadMessages(id);
            loadMembers(); // Refresh members list logic
        };

        // --- CHAT ENGINE ---
        let msgListener = null; // To detach old listeners if we wanted to be strict

        function loadMessages(srvId) {
            const feed = document.getElementById('message-feed');
            feed.innerHTML = '<div style="text-align:center; color:#555; margin-top:20px;">Establishing Uplink...</div>';
            
            onValue(ref(db, `messages/${srvId}`), (snap) => {
                feed.innerHTML = "";
                const data = snap.val() || {};
                
                Object.entries(data).forEach(([mid, m]) => {
                    // Get sender info from cache or message fallback
                    const uData = usersCache[m.sender] || {};
                    const nick = uData.nick || m.sender;
                    const pfp = uData.pfp || "https://cdn-icons-png.flaticon.com/512/1077/1077114.png";
                    
                    const isMe = m.sender === me.username;
                    const canMod = me.role === 'owner' || me.role === 'admin';

                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = `
                        <img src="${pfp}" class="msg-avatar" onclick="alert('${nick} - ${uData.bio || 'No bio'}')">
                        <div class="msg-content">
                            <div class="msg-top">
                                <span class="msg-name">${nick}</span>
                                <span>${new Date(m.ts).toLocaleTimeString()}</span>
                            </div>
                            <div style="line-height:1.4;">${m.text}</div>
                            ${renderAttachment(m.attachment)}
                            ${canMod ? `<div style="margin-top:5px; font-size:0.7em; color:red; cursor:pointer;" onclick="deleteMsg('${mid}')">[DELETE RECORD]</div>` : ''}
                        </div>
                    `;
                    feed.appendChild(div);
                });
                
                // Scroll to bottom
                feed.scrollTop = feed.scrollHeight;
            });
        }

        function renderAttachment(att) {
            if(!att) return '';
            // Check if image
            const isImg = att.type.includes('image');
            if(isImg) {
                return `<img src="${att.url}" class="attachment-img" onclick="window.open('${att.url}')">`;
            } else {
                return `<a href="${att.url}" target="_blank" class="attachment-file">📄 DOWNLOAD: ${att.name}</a>`;
            }
        }

        // --- MESSAGING & UPLOAD ---
        window.sendText = () => {
            const inp = document.getElementById('chat-input');
            const txt = inp.value.trim();
            if(!txt || !currentServer) return;
            
            // Push to DB
            push(ref(db, `messages/${currentServer}`), {
                sender: me.username,
                text: txt,
                ts: Date.now()
            });
            inp.value = "";
        };

        // Handle Enter Key
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') window.sendText();
        });

        window.uploadAndSend = async () => {
            const fileInput = document.getElementById('file-upload');
            const file = fileInput.files[0];
            if(!file) return;

            // Validation
            if(file.size > 10 * 1024 * 1024) {
                alert("ERROR: File exceeds 10MB limit.");
                fileInput.value = ""; 
                return;
            }

            // Visual Feedback
            const inp = document.getElementById('chat-input');
            const originalPlaceholder = inp.placeholder;
            inp.placeholder = `UPLOADING ${file.name}... (PLEASE WAIT)`;
            inp.disabled = true;

            try {
                // Upload to Storage
                const storageRef = sRef(storage, `uploads/${Date.now()}_${file.name}`);
                await uploadBytes(storageRef, file);
                const url = await getDownloadURL(storageRef);

                // Send Message with Attachment Data
                push(ref(db, `messages/${currentServer}`), {
                    sender: me.username,
                    text: `Attached file: ${file.name}`,
                    ts: Date.now(),
                    attachment: {
                        name: file.name,
                        type: file.type,
                        url: url
                    }
                });
            } catch(e) {
                console.error(e);
                alert("Upload Failed. Check console.");
            } finally {
                // Reset UI
                inp.placeholder = originalPlaceholder;
                inp.disabled = false;
                fileInput.value = ""; // Allow re-selecting same file
            }
        };

        window.deleteMsg = (mid) => {
            if(confirm("Confirm deletion?")) {
                remove(ref(db, `messages/${currentServer}/${mid}`));
            }
        };

        // --- MEMBER LIST ---
        function loadMembers() {
            // We just list all users in DB, marking online ones
            onValue(ref(db, 'users'), async (snap) => {
                const list = document.getElementById('members-list-wrapper');
                list.innerHTML = "";
                
                const allUsers = snap.val() || {};
                const presSnap = await get(ref(db, 'presence'));
                const onlineData = presSnap.val() || {};

                Object.entries(allUsers).forEach(([uid, data]) => {
                    const isOnline = onlineData[uid];
                    const div = document.createElement('div');
                    div.className = 'member-item';
                    div.innerHTML = `
                        <div class="status-dot" style="background: ${isOnline ? '#2ecc71' : '#555'}"></div>
                        <img src="${data.pfp || 'https://cdn-icons-png.flaticon.com/512/1077/1077114.png'}" style="width:24px; height:24px; border-radius:50%;">
                        <span style="font-weight:bold; color:${isOnline ? 'white' : '#777'}">${data.nick || uid}</span>
                        ${(me.role === 'owner' || me.role === 'admin') && uid !== me.username ? `<span style="margin-left:auto; color:red;" onclick="banUser('${uid}')">🚫</span>` : ''}
                    `;
                    list.appendChild(div);
                });
            });
        }

        window.banUser = (uid) => {
            if(confirm(`BAN ${uid}? They will be disconnected.`)) {
                update(ref(db, `users/${uid}`), { banned: true });
            }
        };

        // --- OWNER/ADMIN MODALS ---
        window.openOwnerConsole = () => {
            if(me.role !== 'owner') return alert("ACCESS DENIED");
            document.getElementById('modal-owner').style.display = 'flex';
        };

        window.ownerCreateUser = () => {
            const u = document.getElementById('mk-user').value;
            const p = document.getElementById('mk-pass').value;
            const r = document.getElementById('mk-role').value;

            if(!u || !p) return;

            set(ref(db, 'users/' + u), {
                username: u,
                password: p,
                role: r,
                nick: u,
                pfp: "",
                banned: false
            });
            alert("USER AUTHORIZED");
            closeModals();
        };

        // --- SERVER MODAL LOGIC ---
        window.openServerModal = () => {
            if(me.role === 'user') return alert("INSUFFICIENT PERMISSIONS");
            document.getElementById('modal-server').style.display = 'flex';
        };
        window.toggleServerMode = (mode) => {
            if(mode === 'create') {
                document.getElementById('form-create').classList.remove('hidden');
                document.getElementById('form-join').classList.add('hidden');
            } else {
                document.getElementById('form-create').classList.add('hidden');
                document.getElementById('form-join').classList.remove('hidden');
            }
        };

        window.createServer = () => {
            const name = document.getElementById('new-srv-name').value;
            const img = document.getElementById('new-srv-img').value;
            const type = document.getElementById('new-srv-type').value;
            if(!name) return;

            const newRef = push(ref(db, 'servers'));
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            set(newRef, {
                name, img, type, inviteCode: code, owner: me.username
            });
            closeModals();
        };

        window.joinServer = async () => {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            const snap = await get(ref(db, 'servers'));
            let found = null;
            
            snap.forEach(c => {
                if(c.val().inviteCode === code) found = c.key;
            });

            if(found) {
                await update(ref(db, `users/${me.username}/joinedServers`), { [found]: true });
                // Update local state
                me.joinedServers = me.joinedServers || {};
                me.joinedServers[found] = true;
                localStorage.setItem('dwellicon_user', JSON.stringify(me));
                alert("SERVER LINK ESTABLISHED");
                closeModals();
            } else {
                alert("INVALID FREQUENCY CODE");
            }
        };

        // --- PROFILE ---
        window.openProfile = () => document.getElementById('modal-profile').style.display = 'flex';
        window.saveProfile = () => {
            const n = document.getElementById('edit-nick').value;
            const b = document.getElementById('edit-bio').value;
            const p = document.getElementById('edit-pfp').value;
            
            const updates = { nick: n, bio: b, pfp: p };
            update(ref(db, `users/${me.username}`), updates);
            
            // Local update
            Object.assign(me, updates);
            localStorage.setItem('dwellicon_user', JSON.stringify(me));
            
            // Refresh UI immediately
            document.getElementById('my-nick').innerText = n || me.username;
            document.getElementById('my-pfp').src = p || "https://cdn-icons-png.flaticon.com/512/1077/1077114.png";
            
            closeModals();
        };

        window.closeModals = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');

        // --- AUTO LOGIN ---
        const saved = localStorage.getItem('dwellicon_user');
        if(saved) {
            const sUser = JSON.parse(saved);
            // Verify not banned
            get(ref(db, `users/${sUser.username}`)).then(snap => {
                if(snap.exists() && snap.val().banned) {
                    alert("ACCOUNT BANNED");
                    localStorage.removeItem('dwellicon_user');
                } else {
                    finalizeLogin(sUser);
                }
            }).catch(() => finalizeLogin(sUser)); // Offline fallback
        }

    </script>
</body>
</html>
