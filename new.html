<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwellicon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- THEME & RESET --- */
        :root {
            --bg-app: #000000;
            --bg-sec: #0a0a0a;
            --border: 1px solid #222;
            --text: #ffffff;
            --text-dim: #666;
            --accent: #fff;
            --danger: #e74c3c;
            --own: #f1c40f;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-app); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* --- UTILS --- */
        .hidden { display: none !important; }
        .btn { 
            padding: 8px 12px; border-radius: 4px; border: 1px solid #333; 
            background: #111; color: white; cursor: pointer; font-weight: 600; font-size: 12px;
        }
        .btn:hover { background: #222; }
        .btn-primary { background: white; color: black; border-color: white; }
        .btn-primary:hover { background: #ddd; }
        
        input, select, textarea { 
            background: #111; border: 1px solid #333; color: white; 
            padding: 10px; width: 100%; border-radius: 4px; margin-bottom: 10px;
            resize: none;
        }

        /* --- LAYOUT (GRID) --- */
        #app-view {
            display: grid;
            grid-template-columns: 70px 240px 1fr 240px; /* Sidebar | Info | Chat | Members */
            height: 100vh; width: 100vw;
        }

        /* 1. SERVERS */
        #col-servers { 
            background: var(--bg-app); border-right: var(--border); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 12px 0; gap: 8px; overflow-y: auto; 
        }
        .srv-icon { 
            width: 48px; height: 48px; border-radius: 50%; background: #111; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
            font-weight: 800; overflow: hidden;
        }
        .srv-icon:hover, .srv-icon.active { border-radius: 16px; background: white; color: black; }
        .srv-icon img { width: 100%; height: 100%; object-fit: cover; }

        /* 2. INFO (Middle Left) */
        #col-info { 
            background: var(--bg-sec); border-right: var(--border); 
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .header { height: 50px; border-bottom: var(--border); display: flex; align-items: center; padding: 0 16px; font-weight: 700; }
        .user-bar { 
            padding: 10px; background: #050505; border-top: var(--border); 
            display: flex; align-items: center; gap: 10px;
        }

        /* 3. CHAT (Center) */
        #col-chat { 
            background: var(--bg-app); display: flex; flex-direction: column; 
            min-width: 0; /* CRITICAL: Allows text wrapping in grid */
        }
        .chat-list { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 20px;
        }
        .input-zone { 
            padding: 16px; border-top: var(--border); background: var(--bg-app);
            display: flex; gap: 10px; align-items: flex-start;
        }
        #msg-input { height: 42px; max-height: 150px; margin: 0; padding: 10px; line-height: 1.4; }

        /* MESSAGES */
        .msg { display: flex; gap: 14px; }
        .msg-av { width: 36px; height: 36px; border-radius: 50%; background: #222; flex-shrink: 0; cursor: pointer; }
        .msg-body { min-width: 0; flex: 1; }
        .msg-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .msg-user { font-weight: 600; cursor: pointer; }
        .msg-user:hover { text-decoration: underline; }
        .msg-time { font-size: 11px; color: var(--text-dim); }
        .msg-text { white-space: pre-wrap; word-break: break-word; line-height: 1.5; color: #ddd; }
        
        /* TAGS */
        .tag { font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: 800; color: black; }
        .tag.own { background: var(--own); }
        .tag.adm { background: var(--danger); color: white; }

        /* 4. MEMBERS (Right) */
        #col-members { 
            background: var(--bg-sec); border-left: var(--border); 
            padding: 20px; overflow-y: auto;
        }
        .mem-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; opacity: 0.7; cursor: pointer; }
        .mem-item:hover { opacity: 1; }

        /* MODALS */
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal { background: #080808; border: 1px solid #333; padding: 24px; width: 360px; border-radius: 8px; }
        .modal h3 { margin-bottom: 16px; font-weight: 700; border-bottom: 1px solid #222; padding-bottom: 10px; }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 300px; text-align: center; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">Private Access</h2>
            <input type="text" id="log-user" placeholder="Username">
            <input type="password" id="log-pass" placeholder="Password">
            <button class="btn btn-primary" style="width:100%" onclick="app.login()">AUTHENTICATE</button>
            <p id="log-err" style="color: var(--danger); font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- APP -->
    <div id="app-view" class="hidden">
        <!-- 1. SERVERS -->
        <div id="col-servers">
            <div class="srv-icon" onclick="ui.openServerModal()" style="border-style: dashed; color: #666;">+</div>
            <div style="width: 20px; height: 1px; background: #222;"></div>
            <div id="server-list" style="display:flex; flex-direction:column; gap:8px; align-items:center; width:100%;"></div>
        </div>

        <!-- 2. INFO (Empty middle part as requested, kept structure for layout) -->
        <div id="col-info">
            <div class="header" id="active-server-name">...</div>
            
            <!-- Spacer to push user bar down -->
            <div style="flex:1;"></div>

            <div class="user-bar">
                <img id="my-pfp" src="" style="width:32px; height:32px; border-radius:50%; background:#333;">
                <div style="flex:1; overflow:hidden;">
                    <div id="my-nick" style="font-weight:700; font-size:13px;"></div>
                    <div id="my-role" style="font-size:10px; color: var(--text-dim);"></div>
                </div>
                <button class="btn" style="padding:4px 8px;" onclick="ui.openProfile()">⚙️</button>
                <button class="btn" style="padding:4px 8px; color:var(--danger);" onclick="app.logout()">×</button>
            </div>
        </div>

        <!-- 3. CHAT -->
        <div id="col-chat">
            <div class="header">
                <span style="color:var(--text-dim); margin-right:6px;">#</span> general
                <span id="private-code" style="margin-left:auto; font-size:10px; border:1px solid #333; padding:2px 6px; border-radius:4px; display:none;"></span>
            </div>
            
            <div id="chat-feed" class="chat-list"></div>
            
            <div class="input-zone">
                <input type="file" id="file-bin" hidden>
                <button class="btn" onclick="document.getElementById('file-bin').click()">📎</button>
                <textarea id="msg-input" placeholder="Message... (Enter to send, Shift+Enter for new line)"></textarea>
            </div>
        </div>

        <!-- 4. MEMBERS -->
        <div id="col-members">
            <div style="font-size:11px; font-weight:800; color:var(--text-dim); margin-bottom:12px;">ONLINE</div>
            <div id="member-list"></div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="modal-owner" class="modal-bg">
        <div class="modal">
            <h3>Admin Console</h3>
            <input type="text" id="mk-user" placeholder="New Username">
            <input type="text" id="mk-pass" placeholder="New Password">
            <select id="mk-role">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            <button class="btn btn-primary" style="width:100%" onclick="app.createAccount()">Create Account</button>
            <button class="btn" style="width:100%; margin-top:8px;" onclick="ui.closeModals()">Close</button>
        </div>
    </div>

    <div id="modal-server" class="modal-bg">
        <div class="modal">
            <h3>Server</h3>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-primary" style="flex:1" onclick="document.getElementById('mv-create').classList.remove('hidden');document.getElementById('mv-join').classList.add('hidden')">Create</button>
                <button class="btn" style="flex:1" onclick="document.getElementById('mv-create').classList.add('hidden');document.getElementById('mv-join').classList.remove('hidden')">Join</button>
            </div>
            <div id="mv-create">
                <input type="text" id="new-name" placeholder="Name">
                <input type="text" id="new-img" placeholder="Image URL">
                <select id="new-type"><option value="public">Public</option><option value="private">Private</option></select>
                <button class="btn btn-primary" style="width:100%" onclick="app.createServer()">Launch</button>
            </div>
            <div id="mv-join" class="hidden">
                <input type="text" id="join-code" placeholder="Invite Code">
                <button class="btn btn-primary" style="width:100%" onclick="app.joinServer()">Join</button>
            </div>
            <button class="btn" style="width:100%; margin-top:8px;" onclick="ui.closeModals()">Cancel</button>
        </div>
    </div>

    <div id="modal-user" class="modal-bg">
        <div class="modal">
            <div style="text-align:center;">
                <img id="u-pfp" src="" style="width:64px; height:64px; border-radius:50%; margin-bottom:10px;">
                <h3 id="u-name" style="border:none; margin:0;">User</h3>
                <p id="u-role" style="color:var(--text-dim); font-size:12px; margin-bottom:15px;">Role</p>
                <div id="u-actions"></div>
            </div>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="ui.closeModals()">Close</button>
        </div>
    </div>

    <div id="modal-profile" class="modal-bg">
        <div class="modal">
            <h3>Edit Profile</h3>
            <input type="text" id="ed-nick" placeholder="Nickname">
            <input type="text" id="ed-pfp" placeholder="Avatar URL">
            <button class="btn btn-primary" style="width:100%" onclick="app.saveProfile()">Save</button>
            <button class="btn" style="width:100%; margin-top:8px;" onclick="ui.closeModals()">Cancel</button>
        </div>
    </div>

    <!-- LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const config = {
            apiKey: "AIzaSyAulcwmA2r2Z0Wv5mxyuWwQvPv05E8HvMU",
            authDomain: "dwellicon-42e72.firebaseapp.com",
            databaseURL: "https://dwellicon-42e72-default-rtdb.firebaseio.com",
            projectId: "dwellicon-42e72",
            storageBucket: "dwellicon-42e72.firebasestorage.app",
            messagingSenderId: "634657717896",
            appId: "1:634657717896:web:27f246614fdb2c2398a93d"
        };

        const fApp = initializeApp(config);
        const db = getDatabase(fApp);
        const storage = getStorage(fApp);

        // STATE
        let me = null;
        let activeSrv = null;
        let users = {};

        // UI CONTROLLER
        window.ui = {
            openServerModal: () => {
                const el = document.getElementById('modal-server');
                el.style.display = 'flex';
                if(me.role === 'user') {
                    document.getElementById('mv-create').classList.add('hidden');
                    document.getElementById('mv-join').classList.remove('hidden');
                }
            },
            openProfile: () => document.getElementById('modal-profile').style.display = 'flex',
            closeModals: () => document.querySelectorAll('.modal-bg').forEach(e => e.style.display = 'none'),
            
            renderUserModal: (uid) => {
                const u = users[uid] || { nick: uid, role: 'user' };
                document.getElementById('u-name').innerText = u.nick || uid;
                document.getElementById('u-role').innerText = u.role.toUpperCase();
                document.getElementById('u-pfp').src = u.pfp || `https://ui-avatars.com/api/?name=${uid}&background=222&color=fff`;
                
                const actDiv = document.getElementById('u-actions');
                actDiv.innerHTML = '';
                
                // Permission Check
                const canMod = (me.role === 'owner' || me.role === 'admin') && u.role !== 'owner' && uid !== me.username;
                if(canMod) {
                    const banBtn = document.createElement('button');
                    banBtn.className = 'btn';
                    banBtn.style.background = '#e74c3c';
                    banBtn.style.width = '100%';
                    banBtn.innerText = 'BAN USER';
                    banBtn.onclick = () => app.banUser(uid);
                    actDiv.appendChild(banBtn);
                }
                
                document.getElementById('modal-user').style.display = 'flex';
            }
        };

        // APP LOGIC
        window.app = {
            login: async () => {
                const u = document.getElementById('log-user').value.trim();
                const p = document.getElementById('log-pass').value.trim();
                
                if(u === "Kyson" && p === "12345678") {
                    app.initSession({ username: "Kyson", role: "owner", nick: "Kyson", pfp: "" });
                    return;
                }

                const s = await get(ref(db, 'users/' + u));
                if(s.exists() && s.val().password === p) {
                    if(s.val().banned) return alert("BANNED");
                    app.initSession({ username: u, ...s.val() });
                } else {
                    document.getElementById('log-err').innerText = "Invalid Credentials";
                }
            },

            initSession: (user) => {
                me = user;
                localStorage.setItem('dw_sess', JSON.stringify(me));
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-view').classList.remove('hidden');
                
                // Setup Me
                document.getElementById('my-nick').innerText = me.nick || me.username;
                document.getElementById('my-role').innerText = me.role.toUpperCase();
                document.getElementById('my-pfp').src = me.pfp || `https://ui-avatars.com/api/?name=${me.username}&background=333&color=fff`;

                // Presence
                set(ref(db, `presence/${me.username}`), true);
                window.onbeforeunload = () => remove(ref(db, `presence/${me.username}`));

                app.listen();
            },

            logout: () => {
                if(me) remove(ref(db, `presence/${me.username}`));
                localStorage.removeItem('dw_sess');
                location.reload();
            },

            listen: () => {
                // Users
                onValue(ref(db, 'users'), s => users = s.val() || {});
                
                // Servers
                onValue(ref(db, 'servers'), s => {
                    const list = document.getElementById('server-list');
                    list.innerHTML = '';
                    const all = s.val() || {};
                    Object.entries(all).forEach(([id, data]) => {
                        const canSee = data.type === 'public' || (me.joinedServers && me.joinedServers[id]) || me.role === 'owner';
                        if(canSee) {
                            const d = document.createElement('div');
                            d.className = `srv-icon ${activeSrv === id ? 'active' : ''}`;
                            d.onclick = () => app.loadServer(id, data);
                            d.innerHTML = data.img ? `<img src="${data.img}">` : data.name.substring(0,2).toUpperCase();
                            list.appendChild(d);
                        }
                    });
                    if(!activeSrv && Object.keys(all).length) {
                        const f = Object.keys(all)[0]; 
                        app.loadServer(f, all[f]); // Simple auto-load
                    }
                });
            },

            loadServer: (id, data) => {
                activeSrv = id;
                document.querySelectorAll('.srv-icon').forEach(e => e.classList.remove('active'));
                // (Visual update relies on re-render mostly but this helps)
                
                document.getElementById('active-server-name').innerText = data.name;
                const codeEl = document.getElementById('private-code');
                if(data.type === 'private' && (me.role === 'owner' || me.role === 'admin')) {
                    codeEl.style.display = 'block';
                    codeEl.innerText = `CODE: ${data.inviteCode}`;
                } else {
                    codeEl.style.display = 'none';
                }

                // Chat
                const feed = document.getElementById('chat-feed');
                feed.innerHTML = '';
                onValue(ref(db, `messages/${id}`), snap => {
                    feed.innerHTML = '';
                    const msgs = snap.val() || {};
                    Object.entries(msgs).forEach(([mid, m]) => {
                        const u = users[m.sender] || {};
                        const nick = u.nick || m.sender;
                        const pfp = u.pfp || `https://ui-avatars.com/api/?name=${m.sender}&background=222&color=fff`;
                        
                        let roleTag = '';
                        if(u.role === 'owner') roleTag = `<span class="tag own">OWNER</span>`;
                        else if(u.role === 'admin') roleTag = `<span class="tag adm">ADMIN</span>`;

                        const d = document.createElement('div');
                        d.className = 'msg';
                        d.innerHTML = `
                            <img src="${pfp}" class="msg-av" onclick="ui.renderUserModal('${m.sender}')">
                            <div class="msg-body">
                                <div class="msg-head">
                                    <span class="msg-user" onclick="ui.renderUserModal('${m.sender}')">${nick}</span>
                                    ${roleTag}
                                    <span class="msg-time">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                                </div>
                                <div class="msg-text">${m.text || ''}</div>
                                ${m.att ? (m.att.type.includes('image') ? `<img src="${m.att.url}" style="max-width:300px; border-radius:8px; margin-top:5px;">` : `<a href="${m.att.url}" target="_blank" style="color:cyan; display:block; margin-top:5px;">📎 ${m.att.name}</a>`) : ''}
                            </div>
                        `;
                        feed.appendChild(d);
                    });
                    feed.scrollTop = feed.scrollHeight;
                });

                app.loadMembers();
            },

            loadMembers: () => {
                onValue(ref(db, 'users'), async (snap) => {
                    const list = document.getElementById('member-list');
                    list.innerHTML = '';
                    const onSnap = await get(ref(db, 'presence'));
                    const online = onSnap.val() || {};
                    
                    Object.entries(snap.val() || {}).forEach(([uid, u]) => {
                        if(online[uid]) {
                            const d = document.createElement('div');
                            d.className = 'mem-item';
                            d.onclick = () => ui.renderUserModal(uid);
                            d.innerHTML = `
                                <img src="${u.pfp || `https://ui-avatars.com/api/?name=${uid}`}" style="width:24px; height:24px; border-radius:50%;">
                                <span style="font-weight:600; font-size:13px;">${u.nick || uid}</span>
                                ${u.role === 'owner' ? '👑' : ''}
                            `;
                            list.appendChild(d);
                        }
                    });
                });
            },

            send: (txt, att=null) => {
                if((!txt && !att) || !activeSrv) return;
                push(ref(db, `messages/${activeSrv}`), {
                    sender: me.username,
                    text: txt,
                    att: att,
                    ts: Date.now()
                });
            },

            upload: async () => {
                const file = document.getElementById('file-bin').files[0];
                if(!file) return;
                
                const box = document.getElementById('msg-input');
                const oldPlace = box.placeholder;
                box.placeholder = "UPLOADING... PLEASE WAIT";
                box.disabled = true;

                try {
                    const r = sRef(storage, `up/${Date.now()}_${file.name}`);
                    await uploadBytes(r, file);
                    const url = await getDownloadURL(r);
                    app.send(null, { name: file.name, type: file.type, url });
                } catch(e) { alert("Upload Failed"); console.error(e); }
                
                box.placeholder = oldPlace;
                box.disabled = false;
                document.getElementById('file-bin').value = ''; // Reset
            },

            // ADMIN
            banUser: (uid) => {
                if(confirm(`Ban ${uid}?`)) {
                    update(ref(db, `users/${uid}`), { banned: true });
                    ui.closeModals();
                }
            },
            createAccount: () => {
                const u = document.getElementById('mk-user').value;
                const p = document.getElementById('mk-pass').value;
                const r = document.getElementById('mk-role').value;
                if(u && p) {
                    set(ref(db, `users/${u}`), { username: u, password: p, role: r, nick: u, pfp: '' });
                    alert("User Created");
                    ui.closeModals();
                }
            },
            createServer: () => {
                const n = document.getElementById('new-name').value;
                if(!n) return;
                const code = Math.random().toString(36).substring(2,8).toUpperCase();
                const r = push(ref(db, 'servers'));
                set(r, {
                    name: n, img: document.getElementById('new-img').value,
                    type: document.getElementById('new-type').value,
                    inviteCode: code, owner: me.username
                });
                ui.closeModals();
            },
            joinServer: async () => {
                const c = document.getElementById('join-code').value.trim().toUpperCase();
                const s = await get(ref(db, 'servers'));
                let id = null;
                s.forEach(x => { if(x.val().inviteCode === c) id = x.key; });
                if(id) {
                    await update(ref(db, `users/${me.username}/joinedServers`), { [id]: true });
                    me.joinedServers = me.joinedServers || {};
                    me.joinedServers[id] = true;
                    localStorage.setItem('dw_sess', JSON.stringify(me));
                    alert("Joined");
                    ui.closeModals();
                } else alert("Invalid Code");
            },
            saveProfile: () => {
                const n = document.getElementById('ed-nick').value;
                const p = document.getElementById('ed-pfp').value;
                update(ref(db, `users/${me.username}`), { nick: n, pfp: p });
                me.nick = n; me.pfp = p;
                localStorage.setItem('dw_sess', JSON.stringify(me));
                document.getElementById('my-nick').innerText = n;
                document.getElementById('my-pfp').src = p;
                ui.closeModals();
            }
        };

        // EVENTS
        document.getElementById('msg-input').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                app.send(e.target.value);
                e.target.value = '';
            }
        });
        
        document.getElementById('file-bin').addEventListener('change', app.upload);

        // ALT + X for Admin
        document.addEventListener('keydown', e => {
            if(e.altKey && e.key.toLowerCase() === 'x') {
                if(me && me.role === 'owner') {
                    document.getElementById('modal-owner').style.display = 'flex';
                }
            }
        });

        // Init
        const sess = localStorage.getItem('dw_sess');
        if(sess) {
            const u = JSON.parse(sess);
            get(ref(db, `users/${u.username}`)).then(s => {
                if(s.exists() && s.val().banned) {
                    localStorage.removeItem('dw_sess');
                    location.reload();
                } else app.initSession(u);
            });
        }

    </script>
</body>
</html>
